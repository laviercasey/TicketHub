services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
      - DB_HOST=db
      - DB_NAME=${MYSQL_DATABASE:-tickethub}
      - DB_USER=${MYSQL_USER:-tickethub}
      - DB_PASS=${MYSQL_PASSWORD}
      - SECRET_SALT=${SECRET_SALT}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - DB_PREFIX=${DB_PREFIX:-th_}
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-1}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tickethub}
      MYSQL_USER: ${MYSQL_USER:-tickethub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./setup/inc/tickethub-v1.0.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  db_data:
